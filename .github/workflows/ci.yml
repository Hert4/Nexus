name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.6

      - name: Run ruff
        run: ruff check backend/src/

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Fake llama-server — tests dùng mock, không cần server thật
      LLAMACPP_CHAT_URL: "http://localhost:8080/v1"
      LLAMACPP_EMBED_URL: "http://localhost:8081/v1"
      LLM_API_KEY: "test-key"
      QDRANT_URL: "http://localhost:6333"
      QDRANT_COLLECTION: "nexus_test"
      APP_ENV: "test"
      LOG_LEVEL: "WARNING"
      JWT_SECRET: "test-secret"
      CORS_ORIGINS: '["http://localhost:3000"]'
      # SQLite DBs vào /tmp thay vì /app/data (không tồn tại ngoài Docker)
      NEXUS_DATA_DIR: "/tmp/nexus-test-data"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd backend
          uv pip install --system -e ".[test]"

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false   # chỉ build, không push (local project)
          tags: nexus-ai-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image size
        run: |
          docker images nexus-ai-api:${{ github.sha }} --format "Size: {{.Size}}"
