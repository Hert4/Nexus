services:
  # llama-server chạy NATIVE trên host (đã cài qua Homebrew)
  # Không cần Docker container — API kết nối qua host.docker.internal
  # Khởi động thủ công: make serve-chat / make serve-embed
  # hoặc chạy scripts/start-llamacpp.sh trước khi make up

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-api
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Trỏ vào host để reach llama-server
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src  # Hot reload
    restart: unless-stopped

volumes:
  qdrant_data:
