apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus-ai
type: Opaque
# Giá trị base64-encoded. Thay bằng giá trị thực khi deploy production.
# echo -n "your-secret" | base64
stringData:
  # LLM_API_KEY: "llama-cpp" cho local, real key cho OpenAI/Groq/Together
  LLM_API_KEY: "llama-cpp"
  JWT_SECRET: "change-me-in-production"
  # Langfuse (để trống nếu chưa dùng)
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
