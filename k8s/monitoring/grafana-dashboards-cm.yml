---
# Grafana datasource ConfigMap — trỏ đến Prometheus trong cùng namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: nexus-ai
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
---
# Grafana dashboard provisioning — load từ ConfigMap "grafana-dashboards"
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: nexus-ai
data:
  nexus.yml: |
    apiVersion: 1
    providers:
      - name: nexus-ai
        orgId: 1
        folder: "Nexus AI"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
