apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: nexus-ai
  labels:
    app: nexus-api
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-api
  template:
    metadata:
      labels:
        app: nexus-api
      annotations:
        # Prometheus auto-discover scrape target
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Để reach llama-server chạy native trên host
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "host.docker.internal"
      containers:
        - name: api
          image: nexus-ai-api:latest
          imagePullPolicy: Never   # dùng local image (k3s local registry)
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      restartPolicy: Always
