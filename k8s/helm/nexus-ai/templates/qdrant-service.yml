apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus-ai.labels" . | nindent 4 }}
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      port: {{ .Values.qdrant.service.port }}
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
  type: {{ .Values.qdrant.service.type }}
