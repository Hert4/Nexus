apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus-ai.labels" . | nindent 4 }}
    app: nexus-api
spec:
  selector:
    app: nexus-api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
  type: {{ .Values.api.service.type }}
