apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexus-ai.labels" . | nindent 4 }}
    app: nexus-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: nexus-api
  template:
    metadata:
      labels:
        app: nexus-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.api.service.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "host.docker.internal"
      containers:
        - name: api
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
